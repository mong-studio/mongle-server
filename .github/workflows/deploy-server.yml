name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'common/**'
      - 'config/**'
      - 'infrastructure/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mongle-server

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: mongle
          MYSQL_USER: mongle
          MYSQL_PASSWORD: mongle
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: mysql://mongle:mongle@127.0.0.1:3306/mongle
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install MySQL client dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y default-libmysqlclient-dev pkg-config
      - name: Grant test database privileges
        run: mysql -h 127.0.0.1 -u root -proot -e "GRANT ALL PRIVILEGES ON \`test_mongle\`.* TO 'mongle'@'%'; FLUSH PRIVILEGES;"
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Run tests
        run: uv run pytest

  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          COMPOSE_B64=$(base64 -w0 docker-compose.prod.yml)
          NGINX_B64=$(base64 -w0 nginx/api.conf)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.BACKEND_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"set -ex && mkdir -p /home/ubuntu/mongle-server && echo ${COMPOSE_B64} | base64 -d > /home/ubuntu/mongle-server/docker-compose.prod.yml && mkdir -p /home/ubuntu/mongle-server/nginx && echo ${NGINX_B64} | base64 -d > /home/ubuntu/mongle-server/nginx/api.conf && cd /home/ubuntu/mongle-server && IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.prod.yml pull && IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.prod.yml run --rm web python manage.py migrate --no-input && IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.prod.yml up -d --remove-orphans && IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.prod.yml restart nginx && docker image prune -f && sleep 10 && set +e && python3 -c \\\"import socket; socket.create_connection(('localhost', 8000), 5)\\\"; HEALTH=\$?; set -e && if [ \$HEALTH -ne 0 ]; then docker ps -a; docker logs mongle-server-web-1 --tail=100; exit \$HEALTH; fi && echo Deployed: ${IMAGE_TAG}\"]}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BACKEND_EC2_INSTANCE_ID }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BACKEND_EC2_INSTANCE_ID }}" \
            --query "StatusDetails" --output text)

          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BACKEND_EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" --output text

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BACKEND_EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" --output text

          [ "$STATUS" = "Success" ] || { echo "Deploy failed: $STATUS"; exit 1; }
