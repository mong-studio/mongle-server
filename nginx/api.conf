server {
    listen 80;
    server_name api.mongle-village.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.mongle-village.com;

    # Cloudflare Origin 인증서 (EC2 에 수동 배치, repo 에는 없음).
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    client_max_body_size 10m;

    location / {
        # web 컨테이너는 배포마다 재생성되어 IP 가 바뀐다. 변수 proxy_pass + Docker
        # 임베디드 DNS(127.0.0.11) 로 매 요청 재해석해, 옛 IP 고정으로 인한 502 를 막는다.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_web web:8000;
        proxy_pass http://$upstream_web$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
