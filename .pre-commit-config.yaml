minimum_pre_commit_version: "3.8.0"

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint and fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]

      - id: commitizen-check
        name: Commit message format
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]

      - id: ci-check
        name: CI checks before push
        entry: make ci-check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
