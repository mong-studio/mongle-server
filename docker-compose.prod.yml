services:
  web:
    image: mongstudio/mongle-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # 호스트엔 로컬만 노출(배포 헬스체크 localhost:8000 용). 외부는 nginx 통해서만.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: mongstudio/mongle-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
